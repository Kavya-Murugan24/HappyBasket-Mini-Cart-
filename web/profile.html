<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile – HappyBasket</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="navbar">
  <a class="logo" href="/index.html">HappyBasket🌸</a>
  <nav class="nav-right">
    {{NAVBAR}}
  </nav>
  <div class="hamburger" onclick="toggleMenu()">&#9776;</div>
</header>

<h1 style="text-align:center; padding:26px 0 6px;
           font-family:'Great Vibes',cursive; color:#8B0000; font-size:2.6rem;">
  My Profile &#128100;
</h1>

<!-- Save success message from Java -->
{{PROFILE_MSG}}

<center>
  <div class="login-container" style="max-width:560px;">
    <h2 style="color:#8B0000; margin-bottom:18px; font-size:1.3rem;">Account Details</h2>

    <!-- Read-only info from Java/MySQL -->
    <table style="width:100%; border-collapse:separate; border-spacing:0 8px; text-align:left; margin-bottom:8px;">
      <tr>
        <td style="color:#5a2a3a; font-weight:600; padding-right:14px; white-space:nowrap;">Full Name</td>
        <td style="color:#3a1a28; padding:9px 13px; background:#fff8f9; border:1.5px solid #f0a0b4; border-radius:8px;">
          {{FULL_NAME}}
        </td>
      </tr>
      <tr>
        <td style="color:#5a2a3a; font-weight:600; padding-right:14px;">Email</td>
        <td style="color:#3a1a28; padding:9px 13px; background:#fff8f9; border:1.5px solid #f0a0b4; border-radius:8px;">
          {{EMAIL}}
        </td>
      </tr>
    </table>

    <hr style="border:none; border-top:1.5px solid #f0b0c0; margin:16px 0;">
    <h2 style="color:#8B0000; margin-bottom:14px; font-size:1.2rem;">Delivery Address</h2>

    <!-- Editable address form — POSTs to /profile/save → Java updates MySQL -->
    <form method="POST" action="/profile/save">
      <table style="width:100%; border-collapse:separate; border-spacing:0 10px; text-align:left;">
        <tr>
          <td><label style="color:#5a2a3a; font-weight:600;">Phone</label></td>
          <td><input type="tel" name="phone" value="{{PHONE}}" placeholder="Your phone number"
               style="width:100%; padding:9px 13px; border:1.5px solid #f0a0b4; border-radius:8px;
                      font-family:Poppins,sans-serif; font-size:0.9rem; background:#fff8f9; color:#3a1a28; outline:none;"></td>
        </tr>
        <tr>
          <td><label style="color:#5a2a3a; font-weight:600;">Address</label></td>
          <td><input type="text" name="address" value="{{ADDRESS}}" placeholder="Street address"
               style="width:100%; padding:9px 13px; border:1.5px solid #f0a0b4; border-radius:8px;
                      font-family:Poppins,sans-serif; font-size:0.9rem; background:#fff8f9; color:#3a1a28; outline:none;"></td>
        </tr>
        <tr>
          <td><label style="color:#5a2a3a; font-weight:600;">City</label></td>
          <td><input type="text" name="city" value="{{CITY}}" placeholder="City"
               style="width:100%; padding:9px 13px; border:1.5px solid #f0a0b4; border-radius:8px;
                      font-family:Poppins,sans-serif; font-size:0.9rem; background:#fff8f9; color:#3a1a28; outline:none;"></td>
        </tr>
        <tr>
          <td><label style="color:#5a2a3a; font-weight:600;">Pincode</label></td>
          <td><input type="text" name="pincode" value="{{PINCODE}}" placeholder="Pincode"
               style="width:100%; padding:9px 13px; border:1.5px solid #f0a0b4; border-radius:8px;
                      font-family:Poppins,sans-serif; font-size:0.9rem; background:#fff8f9; color:#3a1a28; outline:none;"></td>
        </tr>
      </table>
      <button type="submit"
        style="background:linear-gradient(135deg,#e8304a,#c0405a); color:#fff; border:none;
               padding:10px 40px; border-radius:20px; cursor:pointer; font-family:Poppins,sans-serif;
               font-size:0.95rem; font-weight:600; margin-top:10px; transition:background 0.2s;">
        Save Profile
      </button>
    </form>

    <p style="margin-top:16px; font-size:0.9rem;">
      <a href="/orders.html" style="color:#c0405a; font-weight:600;">&#128722; View My Orders</a>
    </p>
  </div>
</center>

<script src="/cart.js"></script>
</body>
</html>
