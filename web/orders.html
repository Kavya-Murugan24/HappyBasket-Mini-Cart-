<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders – HappyBasket</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="navbar">
  <a class="logo" href="/index.html">HappyBasket🌸</a>
  <nav class="nav-right">
    {{NAVBAR}}
  </nav>
  <div class="hamburger" onclick="toggleMenu()">&#9776;</div>
</header>

<h1 style="text-align:center; padding:26px 0 6px;
           font-family:'Great Vibes',cursive; color:#8B0000; font-size:2.6rem;">
  My Orders &#127800;
</h1>
<p style="text-align:center; color:#a05070; font-size:0.95rem; margin-bottom:16px;">
  All your orders are listed below
</p>
<div style="display:{{NO_ORDERS_DISPLAY}}; text-align:center; padding:40px;
     font-family:'Poppins',sans-serif; color:#a05070;">




<!-- Success / error message from Java -->
{{ORDERS_MSG}}

<!-- No orders yet -->

  <p style="font-size:1.1rem; margin-bottom:14px;">You haven't placed any orders yet &#127830;</p>
  <a href="/index.html#products" class="btn-checkout">Start Shopping</a>
</div>

<!-- Orders list — Java builds each order card from MySQL -->
<div class="orders-container">
  {{ORDERS_HTML}}
</div>
<script src="/cart.js"></script>
</body>
</html>
